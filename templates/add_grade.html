<!DOCTYPE html>
<html>
<head>
    <title>Add Grade</title>
</head>
<body>

<h2>Add Grade</h2>

<form method="POST">

    Roll Number:
    <input type="text" name="roll" required><br><br>

    Subject:
    <input type="text" name="subject" required><br><br>

    Grade:
    <input type="number" name="grade" required><br><br>

    <button type="submit">Add Grade</button>

</form>

</body>
</html>
