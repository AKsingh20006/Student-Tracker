<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h2>Student Records</h2>

{% for student in students %}

<hr>

<h3>{{ student.name }}</h3>

<p>Roll No: {{ student.roll }}</p>

<p>Average: {{ student.average }}</p>

<ul>
{% for subject, grade in student.grades.items() %}
<li>{{ subject }} : {{ grade }}</li>
{% endfor %}
</ul>

{% endfor %}

</body>
</html>
